       node -e 'const fs=require("fs"),c=require("crypto"),h=fs.readFileSync("index.html","utf8");for(const m of h.matchAll(/<script type="application\/ld\+json">([\s\S]*?)<\/script>/g))console.log("sha256-"+c.createHash("sha256").update(m[1]).digest("base64"));' -->
